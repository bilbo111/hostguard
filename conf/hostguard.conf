# HostGuard Configuration

# Language
LANGUAGE="ru"

# Firewall backend
FIREWALL="iptables"

# Providers
SPAMHAUS=true
EDROP=true
FIREHOL=false
ABUSEIPDB=false

# Outgoing protection
BLOCK_SSH=true
BLOCK_SMTP=true
BLOCK_RDP=false
BLOCK_TELNET=false

# Updates
AUTO_UPDATE=true
UPDATE_METHOD="systemd"
UPDATE_INTERVAL="6h"

# Logging
LOGGING=true
